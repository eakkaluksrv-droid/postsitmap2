<!doctype html>
<html lang="th" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบปักหมุดงานภาคสนาม</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Mitr', sans-serif; }
    #map { height: 400px; width: 100%; border-radius: 12px; z-index: 10; }
    .loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255,255,255,0.8); display: none;
      justify-content: center; align-items: center; z-index: 9999;
    }
    #loginOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #f8fafc; display: flex;
      justify-content: center; align-items: center; z-index: 10000;
    }
    .top-right-logo { position: absolute; top: 16px; right: 16px; z-index: 50; }
    .table-container { overflow-x: auto; border-radius: 12px; }
    tr:nth-child(even) { background-color: #f8fafc; }
    .status-รอดำเนินการ { background-color: #f1f5f9; color: #475569; }
    .status-กำลังทำ { background-color: #eff6ff; color: #2563eb; }
    .status-เสร็จสิ้น { background-color: #f0fdf4; color: #16a34a; }
    
    /* Custom Popup Style */
    .custom-popup .leaflet-popup-content-wrapper {
      border-radius: 16px;
      padding: 4px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
    .custom-popup .leaflet-popup-content {
      margin: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen p-2 pb-20 relative">

  <!-- Login Overlay -->
  <div id="loginOverlay">
    <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100 w-full max-w-md mx-4 text-center">
      <div class="mb-8">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDeb5LWilPU-7pX5usRGiwF1o4-cW1cAPjOw&s" 
             alt="Logo" class="w-16 h-16 mx-auto mb-4 rounded-xl object-contain border border-slate-100">
        <h2 class="text-2xl font-bold text-slate-800">เข้าสู่ระบบ</h2>
        <p class="text-slate-500 text-sm">PEA Field Record System</p>
      </div>
      <form onsubmit="event.preventDefault(); handleLogin();" class="space-y-4">
        <div class="text-left">
          <label class="block text-xs font-medium text-slate-700 mb-1">ชื่อผู้ใช้งาน</label>
          <input type="text" id="username" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 ring-blue-500/20" placeholder="Username">
        </div>
        <div class="text-left">
          <label class="block text-xs font-medium text-slate-700 mb-1">รหัสผ่าน</label>
          <input type="password" id="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 ring-blue-500/20" placeholder="Password">
        </div>
        <button type="submit" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 rounded-xl shadow-lg transition-all active:scale-95">เข้าสู่ระบบ</button>
      </form>
    </div>
  </div>

  <div id="mainContent" class="hidden">
    <!-- Header -->
    <div class="top-right-logo flex items-center gap-3">
        <div class="text-right hidden sm:block">
          <p class="text-[10px] text-slate-400 leading-none">เจ้าหน้าที่</p>
          <p id="displayUserName" class="text-sm font-semibold text-slate-700"></p>
        </div>
        <button onclick="handleLogout()" class="bg-white border border-rose-100 text-rose-500 px-3 py-1.5 rounded-lg text-xs hover:bg-rose-50 transition-all shadow-sm">ออก</button>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSDeb5LWilPU-7pX5usRGiwF1o4-cW1cAPjOw&s" alt="Logo" class="w-10 h-10 rounded-lg shadow-sm bg-white object-contain p-1 border border-slate-100">
    </div>

    <div class="loading-overlay" id="loader">
      <div class="flex flex-col items-center gap-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
        <p class="text-blue-600 font-medium animate-pulse">กำลังประมวลผล...</p>
      </div>
    </div>

    <div class="max-w-6xl mx-auto space-y-4 pt-12">
      <!-- Map & Form Section -->
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <!-- Map -->
        <div class="lg:col-span-5 space-y-4">
          <div class="bg-white p-2 rounded-2xl shadow-sm border border-slate-100">
            <div id="map"></div>
            <div class="p-3">
              <button onclick="getLocation()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-xs py-3 rounded-xl flex items-center justify-center gap-2 transition-all shadow-md">
                📍 ปักหมุดพิกัดปัจจุบัน (GPS)
              </button>
            </div>
          </div>
        </div>

        <!-- Form -->
        <div class="lg:col-span-7">
          <form id="dataForm" class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="space-y-4">
                <div class="flex justify-between items-center border-b pb-2">
                  <h3 class="font-medium text-blue-600 text-sm">ข้อมูลงาน</h3>
                  <button type="button" onclick="resetForm()" class="text-[10px] bg-emerald-50 text-emerald-600 px-3 py-1 rounded-full font-bold hover:bg-emerald-100">
                    + งานใหม่
                  </button>
                </div>
                
                <div class="grid grid-cols-2 gap-2">
                  <div>
                    <label class="block text-[10px] font-medium text-slate-500">วันที่</label>
                    <input type="date" id="date" name="วันที่ทำรายการ" readonly class="w-full px-3 py-1.5 rounded-lg bg-slate-50 border border-slate-200 text-xs font-bold">
                  </div>
                  <div>
                    <label class="block text-[10px] font-medium text-slate-500">รหัสบริการ</label>
                    <input type="text" id="id_service" name="id_service" readonly class="w-full px-3 py-1.5 rounded-lg bg-blue-50 border border-blue-100 text-blue-700 font-mono font-bold text-xs">
                  </div>
                </div>

                <div>
                  <label class="block text-xs font-medium text-slate-700 mb-1">ชื่อ-นามสกุล ลูกค้า</label>
                  <input type="text" id="name" name="ชื่อ-นามสกุล" required class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none focus:border-blue-500 transition-all text-sm">
                </div>

                <div>
                  <label class="block text-xs font-medium text-blue-600 mb-1 font-bold">ประเภทคำสั่งงาน</label>
                  <select id="work_order" name="คำสั่งงาน" class="w-full px-4 py-2 rounded-xl border border-blue-200 bg-blue-50 text-blue-800 font-bold focus:ring-2 ring-blue-500/20 outline-none text-sm">
                    <option value="เริ่มงดจ่ายไฟ">เริ่มงดจ่ายไฟ</option>
                    <option value="งดจ่ายไฟ">งดจ่ายไฟ</option>
                    <option value="ให้ต่อสาย">ให้ต่อสาย</option>
                    <option value="ต่อสาย">ต่อสาย</option>
                    <option value="ให้ต่อมิเตอร์">ให้ต่อมิเตอร์</option>
                    <option value="ต่อมิเตอร์">ต่อมิเตอร์</option>
                    <option value="ให้ถอดมิเตอร์">ให้ถอดมิเตอร์</option>
                    <option value="ถอดมิเตอร์">ถอดมิเตอร์</option>
                    <option value="ผ่อนผันครั้งที่ 1">ผ่อนผันครั้งที่ 1</option>
                    <option value="ผ่อนผันครั้งที่ 2">ผ่อนผันครั้งที่ 2</option>
                    <option value="กรณีพิเศษ">กรณีพิเศษ</option>
                  </select>
                </div>
              </div>

              <div class="space-y-4">
                <h3 class="font-medium text-slate-400 border-b pb-2 text-sm">รายละเอียดทางเทคนิค</h3>
                <div>
                  <label class="block text-xs font-medium text-slate-700 mb-1">พิกัด (Lat, Lng)</label>
                  <input type="text" id="local" name="local" oninput="handleManualLocation(this.value)" class="w-full px-4 py-2 rounded-xl bg-white border border-slate-200 text-slate-700 font-mono text-xs focus:border-blue-500 outline-none" placeholder="19.89, 99.81">
                </div>
                <div class="grid grid-cols-2 gap-2">
                  <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">CA</label>
                    <input type="text" name="CA" id="CA" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none text-sm">
                  </div>
                  <div>
                    <label class="block text-xs font-medium text-slate-700 mb-1">PEA</label>
                    <input type="text" name="PEA" id="PEA" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none text-sm">
                  </div>
                </div>
                <div>
                  <label class="block text-xs font-medium text-slate-700 mb-1">สถานะ</label>
                  <select id="status" name="สถานะ" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none text-sm">
                    <option value="รอดำเนินการ">รอดำเนินการ</option>
                    <option value="กำลังทำ">กำลังทำ</option>
                    <option value="เสร็จสิ้น">เสร็จสิ้น</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="pt-2 flex flex-wrap gap-3">
              <button type="button" id="btnAdd" onclick="submitData('add')" class="flex-1 bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-all text-sm">
                บันทึกงาน
              </button>
              <button type="button" id="btnUpdate" onclick="submitData('update')" class="hidden flex-1 bg-amber-500 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-all text-sm">
                อัปเดต
              </button>
              <button type="button" id="btnDelete" onclick="confirmDelete()" class="hidden bg-rose-50 text-rose-600 font-medium px-6 py-3.5 rounded-xl border border-rose-100">
                ลบ
              </button>
            </div>
            <input type="hidden" id="user" name="user">
          </form>
        </div>
      </div>

      <!-- History Section -->
      <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 mt-4">
        <div class="flex flex-col space-y-4 mb-4">
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <h2 class="text-lg font-bold text-slate-800">สืบค้นประวัติงาน</h2>
            <div class="flex flex-wrap gap-2 w-full md:w-auto">
               <select id="filterUser" onchange="applyFilters()" class="px-3 py-2 rounded-lg border border-slate-200 text-xs outline-none bg-slate-50 font-medium">
                 <option value="">-- ผู้ใช้ทุกคน --</option>
               </select>
               <input type="date" id="filterDate" onchange="applyFilters()" class="px-3 py-2 rounded-lg border border-slate-200 text-xs outline-none">
            </div>
          </div>
          <div class="relative w-full">
            <input type="text" id="searchTerm" oninput="applyFilters()" placeholder="ค้นหาชื่อ, รหัส, PEA, หรือพิกัด..." class="w-full pl-4 pr-4 py-2.5 rounded-xl border border-slate-200 text-sm outline-none focus:ring-2 ring-blue-500/10 focus:border-blue-400">
          </div>
        </div>

        <div class="table-container">
          <table class="w-full text-left text-sm">
            <thead class="bg-slate-50 border-b border-slate-100 text-slate-400 text-[10px] uppercase tracking-wider">
              <tr>
                <th class="px-4 py-3">รหัส/วันที่</th>
                <th class="px-4 py-3">ลูกค้า/คำสั่ง</th>
                <th class="px-4 py-3">ผู้บันทึก</th>
                <th class="px-4 py-3">สถานะ</th>
                <th class="px-4 py-3 text-right">จัดการ</th>
              </tr>
            </thead>
            <tbody id="dataTableBody" class="divide-y divide-slate-50">
              <tr><td colspan="5" class="px-4 py-10 text-center text-slate-300 italic">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_Is5ry7GqHNf7G2VDC3Cu3zKfYFJfXBc-94X6oAYdJ5lB4ciWt2xJsn-H6OeZxOzO/exec";

    let map, mainMarker, currentUser = "";
    let dataMarkers = L.layerGroup();
    const loader = document.getElementById('loader');
    window.allData = [];

    async function handleLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const btn = document.getElementById('btnLogin');
      if (!user || !pass) return;

      btn.disabled = true;
      btn.innerText = 'กำลังตรวจสอบ...';

      try {
        const response = await fetch(`${SCRIPT_URL}?action=login_check&username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}&t=${Date.now()}`);
        const result = await response.json();
        if (result.success) {
          currentUser = user;
          onLoginSuccess();
        } else {
          Swal.fire('ล้มเหลว', 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง', 'error');
          btn.disabled = false;
          btn.innerText = 'เข้าสู่ระบบ';
        }
      } catch (error) {
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อระบบได้', 'error');
        btn.disabled = false;
      }
    }

    function onLoginSuccess() {
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('mainContent').classList.remove('hidden');
      document.getElementById('displayUserName').innerText = currentUser;
      document.getElementById('user').value = currentUser;
      initMap();
      resetForm();
      fetchData();
      
      const today = new Date().toLocaleDateString('en-CA');
      document.getElementById('filterDate').value = today;
    }

    function handleLogout() { location.reload(); }

    function initMap() {
      if (map) return;
      map = L.map('map').setView([13.7563, 100.5018], 12);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
      dataMarkers.addTo(map);
      map.on('click', (e) => {
        const lat = e.latlng.lat.toFixed(7);
        const lng = e.latlng.lng.toFixed(7);
        updateMainMarker(lat, lng);
        document.getElementById('local').value = `${lat}, ${lng}`;
      });
    }

    function updateMainMarker(lat, lng) {
      if (mainMarker) map.removeLayer(mainMarker);
      const redIcon = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
      });
      mainMarker = L.marker([lat, lng], { icon: redIcon }).addTo(map);
      map.panTo([lat, lng]);
    }

    function handleManualLocation(val) {
      if (!val) return;
      const parts = val.split(/[\s,]+/).filter(p => p.trim() !== "");
      if (parts.length >= 2) {
        const lat = parseFloat(parts[0]);
        const lng = parseFloat(parts[1]);
        if (!isNaN(lat) && !isNaN(lng)) updateMainMarker(lat, lng);
      }
    }

    function getLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition((pos) => {
          const lat = pos.coords.latitude.toFixed(7);
          const lng = pos.coords.longitude.toFixed(7);
          updateMainMarker(lat, lng);
          document.getElementById('local').value = `${lat}, ${lng}`;
          map.setView([lat, lng], 16);
        });
      }
    }

    async function fetchData() {
      try {
        const response = await fetch(`${SCRIPT_URL}?action=read&t=${Date.now()}`);
        const data = await response.json();
        window.allData = Array.isArray(data) ? data : [];
        updateUserFilterOptions(window.allData);
        applyFilters();
      } catch (e) { console.error("Fetch Error", e); }
    }

    function updateUserFilterOptions(data) {
        const userSelect = document.getElementById('filterUser');
        const users = [...new Set(data.map(item => item.user).filter(u => u))];
        const currentVal = userSelect.value;
        userSelect.innerHTML = '<option value="">-- ผู้ใช้ทุกคน --</option>';
        users.sort().forEach(u => {
            const opt = document.createElement('option');
            opt.value = u;
            opt.textContent = u;
            userSelect.appendChild(opt);
        });
        userSelect.value = currentVal;
    }

    function applyFilters() {
      const fDate = document.getElementById('filterDate').value;
      const fUser = document.getElementById('filterUser').value;
      const sTerm = document.getElementById('searchTerm').value.toLowerCase().trim();

      const filtered = window.allData.filter(item => {
        const itemDateStr = formatDate(item['วันที่ทำรายการ']);
        const matchDate = !fDate || itemDateStr === fDate;
        const matchUser = !fUser || (item.user && item.user === fUser);
        const searchContent = `${item.id_service} ${item['ชื่อ-นามสกุล']} ${item.คำสั่งงาน} ${item.local} ${item.CA} ${item.PEA}`.toLowerCase();
        const matchSearch = !sTerm || searchContent.includes(sTerm);
        return matchDate && matchUser && matchSearch;
      });
      renderTable(filtered);
    }

    function renderTable(data) {
      const tbody = document.getElementById('dataTableBody');
      tbody.innerHTML = '';
      dataMarkers.clearLayers();

      if (data.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-10 text-center text-slate-300 italic">ไม่พบข้อมูล</td></tr>';
        return;
      }

      data.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-slate-50 transition-colors cursor-pointer group';
        tr.onclick = (e) => { if(!e.target.closest('button')) fillForm(item); };
        
        const dateStr = formatDate(item['วันที่ทำรายการ']);
        tr.innerHTML = `
          <td class="px-4 py-4">
            <div class="font-bold text-blue-600">${item.id_service || 'N/A'}</div>
            <div class="text-[9px] text-slate-400">${dateStr}</div>
          </td>
          <td class="px-4 py-4">
            <div class="font-medium text-slate-700 truncate max-w-[120px]">${item['ชื่อ-นามสกุล'] || '-'}</div>
            <div class="text-[10px] text-blue-500 font-bold">${item.คำสั่งงาน || '-'}</div>
          </td>
          <td class="px-4 py-4"><span class="text-xs text-slate-500">${item.user || '-'}</span></td>
          <td class="px-4 py-4"><span class="px-2 py-1 rounded-full text-[9px] font-bold status-${item.สถานะ}">${item.สถานะ}</span></td>
          <td class="px-4 py-4 text-right">
            <button class="text-blue-500 text-xs font-bold opacity-0 group-hover:opacity-100 transition-opacity">แก้ไข</button>
          </td>
        `;
        tbody.appendChild(tr);

        if (item.local && item.local.includes(',')) {
          const [lat, lng] = item.local.split(',').map(n => parseFloat(n));
          if (!isNaN(lat) && !isNaN(lng)) {
            const popupContent = createPopupUI(item);
            L.marker([lat, lng]).addTo(dataMarkers)
              .bindPopup(popupContent, { className: 'custom-popup', maxWidth: 280 });
          }
        }
      });
    }

    function createPopupUI(item) {
      const container = document.createElement('div');
      container.className = "flex flex-col gap-2";
      
      const copyText = `ID: ${item.id_service}\nงาน: ${item.คำสั่งงาน}\nPEA: ${item.PEA}\nลูกค้า: ${item['ชื่อ-นามสกุล']}\nพิกัด: ${item.local}`;
      
      container.innerHTML = `
        <div class="border-b border-slate-100 pb-2">
           <div class="text-[10px] text-blue-500 font-bold uppercase tracking-wide">${item.คำสั่งงาน}</div>
           <div class="text-sm font-bold text-slate-800">${item['ชื่อ-นามสกุล']}</div>
        </div>
        <div class="space-y-1 text-xs">
           <div class="flex justify-between">
              <span class="text-slate-400">PEA:</span>
              <span class="font-mono font-bold text-slate-700">${item.PEA || '-'}</span>
           </div>
           <div class="flex justify-between">
              <span class="text-slate-400">ID:</span>
              <span class="font-mono text-slate-600">${item.id_service}</span>
           </div>
           <div class="flex flex-col mt-1">
              <span class="text-slate-400">พิกัด:</span>
              <span class="font-mono text-[10px] text-slate-600">${item.local}</span>
           </div>
        </div>
        <div class="grid grid-cols-2 gap-2 mt-2">
           <button onclick="window.open('https://www.google.com/maps?q=${item.local}', '_blank')" 
                   class="bg-emerald-600 hover:bg-emerald-700 text-white py-2 rounded-lg text-[11px] font-bold flex items-center justify-center gap-1 shadow-sm transition-all active:scale-95">
              🚀 นำทาง
           </button>
           <button onclick="copyToClipboard('${btoa(unescape(encodeURIComponent(copyText)))}')" 
                   class="bg-slate-100 hover:bg-slate-200 text-slate-700 py-2 rounded-lg text-[11px] font-bold flex items-center justify-center gap-1 transition-all active:scale-95">
              📋 คัดลอก
           </button>
        </div>
      `;
      return container;
    }

    function copyToClipboard(base64) {
      const text = decodeURIComponent(escape(atob(base64)));
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      
      const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 1500,
        timerProgressBar: true
      });
      Toast.fire({ icon: 'success', title: 'คัดลอกข้อมูลแล้ว' });
    }

    async function submitData(action) {
      const form = document.getElementById('dataForm');
      if (!form.reportValidity()) return;

      let finalLocal = document.getElementById('local').value;
      const parts = finalLocal.split(/[\s,]+/).filter(p => p.trim() !== "");
      if (parts.length >= 2) finalLocal = `${parts[0].trim()}, ${parts[1].trim()}`;

      const params = new URLSearchParams();
      params.append('action', action);
      params.append('id_service', document.getElementById('id_service').value);
      params.append('วันที่ทำรายการ', document.getElementById('date').value);
      params.append('user', document.getElementById('user').value);
      params.append('ชื่อ-นามสกุล', document.getElementById('name').value);
      params.append('local', finalLocal);
      params.append('CA', document.getElementById('CA').value);
      params.append('PEA', document.getElementById('PEA').value);
      params.append('คำสั่งงาน', document.getElementById('work_order').value);
      params.append('สถานะ', document.getElementById('status').value);

      loader.style.display = 'flex';
      try {
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
        setTimeout(() => {
          loader.style.display = 'none';
          Swal.fire({ title: 'สำเร็จ', text: 'บันทึกเรียบร้อย', icon: 'success', timer: 1000, showConfirmButton: false });
          resetForm();
          fetchData();
        }, 1200);
      } catch (e) {
        loader.style.display = 'none';
        Swal.fire('Error', 'ไม่สามารถบันทึกได้', 'error');
      }
    }

    function resetForm() {
      const inputs = document.querySelectorAll('#dataForm input[type="text"]');
      inputs.forEach(i => i.value = "");
      const newID = "SV-" + Date.now().toString(36).toUpperCase().slice(-6);
      document.getElementById('id_service').value = newID;
      document.getElementById('date').value = new Date().toLocaleDateString('en-CA');
      document.getElementById('status').value = "รอดำเนินการ";
      document.getElementById('user').value = currentUser;
      document.getElementById('btnAdd').classList.remove('hidden');
      document.getElementById('btnUpdate').classList.add('hidden');
      document.getElementById('btnDelete').classList.add('hidden');
      if (mainMarker) map.removeLayer(mainMarker);
    }

    function fillForm(item) {
      document.getElementById('id_service').value = item.id_service;
      document.getElementById('date').value = formatDate(item['วันที่ทำรายการ']);
      document.getElementById('name').value = item['ชื่อ-นามสกุล'] || "";
      document.getElementById('local').value = item.local || "";
      document.getElementById('CA').value = item.CA || "";
      document.getElementById('PEA').value = item.PEA || "";
      document.getElementById('status').value = item.สถานะ;
      document.getElementById('work_order').value = item.คำสั่งงาน;
      document.getElementById('user').value = item.user || currentUser;
      document.getElementById('btnAdd').classList.add('hidden');
      document.getElementById('btnUpdate').classList.remove('hidden');
      document.getElementById('btnDelete').classList.remove('hidden');
      if (item.local && item.local.includes(',')) {
        const [lat, lng] = item.local.split(',').map(n => parseFloat(n));
        updateMainMarker(lat, lng);
        map.setView([lat, lng], 15);
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function formatDate(dIn) {
      if (!dIn) return "";
      const d = new Date(dIn);
      if (isNaN(d)) return String(dIn).split('T')[0];
      if (typeof dIn === 'string' && dIn.includes('T17:00:00')) {
        const adj = new Date(d.getTime() + 7 * 3600000);
        return adj.toISOString().split('T')[0];
      }
      return d.toISOString().split('T')[0];
    }

    async function confirmDelete() {
      const res = await Swal.fire({ 
        title: 'ลบข้อมูล?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#e11d48', confirmButtonText: 'ลบ', cancelButtonText: 'ยกเลิก'
      });
      if (res.isConfirmed) submitData('delete');
    }
  </script>
